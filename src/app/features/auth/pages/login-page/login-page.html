<section class="auth-card">
  <div class="auth-card__header">
    <span class="auth-card__eyebrow">Login</span>
    <h2>Dang nhap de vao thang trang admin.</h2>
    <p>Sau khi login thanh cong, he thong se dua ban den trang quan ly bai viet.</p>
  </div>

  <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="submit()">
    <label class="auth-field">
      <span>Email</span>
      <input type="email" formControlName="email" placeholder="admin@lapzone.dev" />
    </label>

    <label class="auth-field">
      <span>Mat khau</span>
      <input type="password" formControlName="password" placeholder="Nhap mat khau" />
    </label>

    <button class="auth-submit" type="submit">Dang nhap</button>
  </form>

  <div class="auth-card__footer">
    @if (statusMessage()) {
      <p class="auth-status">{{ statusMessage() }}</p>
    } @else {
      <p class="auth-status">Neu chua co tai khoan, hay quay lai trang signup.</p>
    }

    <p>
      Chua co tai khoan?
      <a routerLink="/auth/signup">Dang ky ngay</a>
    </p>
  </div>
</section>
